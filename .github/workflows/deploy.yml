name: Deploy to github pages and docker hub
on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: download source code
        uses: actions/checkout@v4

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'

      - name: install dependencies
        run: npm ci

      - name: build project
        run: npm run build

      - name: log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: build docker image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/vite-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME}}/vite-app:latest ${{ secrets.DOCKERHUB_USERNAME}}/vite-app:${{github.sa}}
      - name: push docker image to docker hub
        run: |
          docker push ${{secrets.DOCKERHUB_USERNAME}}/vite-app:latest
          docker push ${{secrets.DOCKERHUB_USERNAME}}/vite-app:${{github.sha}}




      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          publish_dir: ./dist
          publish_branch: gh-pages

